# .github/workflows/retrain-trends.yml
name: Retrain Trends Model (Annual)

on:
  schedule:
    - cron: "0 8 1 8 *"  # Annually: August 1st 8am UTC (pre-season)
  workflow_dispatch:      # Manual trigger

jobs:
  retrain:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run Hockey Reference scraper (full history backfill for training data)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python -m scrapers.hockey_reference --history

      - name: Train Trends model and upload artifacts
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          # CURRENT_SEASON is a GitHub Actions variable (not a secret), e.g. "2026-27"
          CURRENT_SEASON: ${{ vars.CURRENT_SEASON }}
        # Artifacts uploaded to: ml-artifacts/{data_season}/ in Supabase Storage
        # player_trends upserted for all current-season skaters with qualifying TOI
        run: python -m ml.train --season "$CURRENT_SEASON"
