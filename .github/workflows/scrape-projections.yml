# .github/workflows/scrape-projections.yml
name: Scrape Projection Sources

on:
  schedule:
    - cron: "0 6 * * 1"  # Weekly Monday 6am UTC (pre-season)
  workflow_dispatch:      # Manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest
    environment: Production
    defaults:
      run:
        working-directory: apps/api

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      # DailyFaceoff, Dobber, Apples & Ginos, and LineupExperts are paste/upload
      # only — they have no HTTP scrape() implementation and must not run here.
      - name: Scrape HashtagHockey
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python -m scrapers.projection.hashtag_hockey

      - name: Scrape NST
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python -m scrapers.nst

      # ELITE_PROSPECTS_API_KEY must be added to GitHub Secrets before this step
      # will write any data. Without it the scraper exits early with a warning.
      # Free-tier key: see apps/api/.env.example for instructions.
      - name: Scrape Elite Prospects (ELC + contract year flags)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ELITE_PROSPECTS_API_KEY: ${{ secrets.ELITE_PROSPECTS_API_KEY }}
        run: python -m scrapers.elite_prospects

      - name: Scrape NHL EDGE (speed stats — Tier 3)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python -m scrapers.nhl_edge
