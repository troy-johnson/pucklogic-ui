name: Scrape MoneyPuck

on:
  schedule:
    # Daily at 07:00 UTC — staggered 1 h after NHL.com
    - cron: "0 7 * * *"
  workflow_dispatch:
    inputs:
      season:
        description: "Season to scrape (e.g. 2025-26)"
        required: false
        default: ""

jobs:
  scrape:
    name: MoneyPuck daily scrape
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e "."

      - name: Run MoneyPuck scraper
        run: python -m scrapers.moneypuck
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          CURRENT_SEASON: ${{ inputs.season || vars.CURRENT_SEASON || '2025-26' }}
